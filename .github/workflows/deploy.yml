name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build
        env:
          # Must match the repo name so asset URLs resolve under aqdas002.github.io/rag-textbook/
          VITE_BASE_PATH: /rag-textbook/
        run: npm run build
      - name: SPA fallback for client-side routing
        # GitHub Pages serves 404.html for unknown paths but keeps the URL bar
        # intact. Copying index.html to 404.html lets the React router pick up
        # /chapters/<id> on first load.
        run: cp dist/index.html dist/404.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
